version: "3.9"
services:
  # Update this to the name of the service you want to work with in your docker-compose.yml file
  lyricova:
    # Uncomment if you want to override the service's Dockerfile to one in the .devcontainer
    # folder. Note that the path of the Dockerfile and context is relative to the *primary*
    # docker-compose.yml file (the first in the devcontainer.json "dockerComposeFile"
    # array). The sample below assumes your primary file is in the root of your project.
    #
    build:
      context: ..
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
      DB_URI: mysql://lyricova:lyricova@mysql/lyricova?ssl=false&allowPublicKeyRetrieval=true
      YTDLP_PATH: /usr/local/py-utils/bin/yt-dlp
      MUSIC_FILES_PATH: /var/music/
    env_file: []
    ports: []
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy

    volumes:
      # Update this to wherever you want VS Code to mount the folder of your project
      - ..:/workspaces:cached
      - lyricova_music:/var/music

    # Uncomment the next four lines if you will use a ptrace-based debugger like C++, Go, and Rust.
    # cap_add:
    #   - SYS_PTRACE
    # security_opt:
    #   - seccomp:unconfined

    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
  mysql:
    image: mysql:9.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lyricova
      MYSQL_USER: lyricova
      MYSQL_PASSWORD: lyricova
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "lyricova", "-plyricova"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  mysql_data:
    external: false
  lyricova_music:
    external: false
